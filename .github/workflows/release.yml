name: Release userscript

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Next version = max(latest-release-tag + patch bump, package.json version).
      # This means every merge to master auto-bumps the patch number, but you
      # can still ship a major/minor by editing package.json (e.g. 0.1.x → 0.2.0).
      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pkg=$(node -p "require('./package.json').version")
          latest=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""' | sed 's/^v//')

          if [ -z "$latest" ]; then
            next="$pkg"
          else
            IFS='.' read -r lmaj lmin lpatch <<< "$latest"
            bumped="$lmaj.$lmin.$((lpatch + 1))"
            # take the larger of (bumped latest) and (package.json) by semver order
            next=$(printf '%s\n%s\n' "$pkg" "$bumped" | sort -V | tail -n1)
          fi

          echo "Releasing v$next (package.json=$pkg, previous=${latest:-none})"
          echo "version=$next" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build userscript
        env:
          TACO_VERSION: ${{ steps.version.outputs.version }}
        run: npm run build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            dist/taco.user.js \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
